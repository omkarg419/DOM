<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #1f2933;
        }

        .todo-app {
            width: 100%;
            max-width: 420px;
            background-color: #f9fafb;
            border-radius: 16px;
            padding: 20px 22px 24px;
            box-shadow:
                0 10px 25px rgba(15, 23, 42, 0.18),
                0 0 0 1px rgba(148, 163, 184, 0.25);
        }

        .todo-app h1 {
            font-size: 1.5rem;
            font-weight: 650;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            text-align: center;
            color: #111827;
            margin-bottom: 16px;
        }

        .todo-input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        #todoMsg {
            flex: 1;
            padding: 10px 12px;
            border-radius: 999px;
            border: 1px solid #d1d5db;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
            background-color: #f3f4f6;
        }

        #todoMsg:focus {
            border-color: #6366f1;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
        }

        #todoBtn {
            padding: 10px 16px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #ffffff;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            white-space: nowrap;
            transition: transform 0.1s ease, box-shadow 0.15s ease, filter 0.15s ease;
            box-shadow: 0 8px 18px rgba(79, 70, 229, 0.45);
        }

        #todoBtn:hover {
            filter: brightness(1.05);
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(79, 70, 229, 0.6);
        }

        #todoBtn:active {
            transform: translateY(0);
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.4);
        }

        #todoList {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 4px;
        }

        #todoList li {
            padding: 10px 12px;
            border-radius: 10px;
            background-color: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background-color 0.15s ease, transform 0.08s ease, box-shadow 0.15s ease;
        }

        #todoList li:hover {
            background-color: #d1d5db;
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.18);
        }

        #todoList li span {
            flex: 1;
            word-break: break-word;
        }

        #todoList li button {
            border: none;
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            color: #ffffff;
            background-color: #ef4444;
            transition: background-color 0.12s ease, transform 0.08s ease, box-shadow 0.12s ease;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.4);
        }

        #todoList li button:hover {
            background-color: #dc2626;
            transform: translateY(-0.5px);
        }

        #todoList li button:active {
            transform: translateY(0);
            box-shadow: 0 2px 6px rgba(239, 68, 68, 0.35);
        }

        @media (max-width: 480px) {
            .todo-app {
                margin: 0 12px;
                padding: 18px 16px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="todo-app">
        <h1>To‑Do</h1>
        <div class="todo-input-row">
            <input type="text" id="todoMsg" placeholder="Add a new task...">
            <button id="todoBtn">Create</button>
        </div>
        <ul id="todoList"></ul>
    </div>
    <script src="TO.js"></script>
</body>
</html>
